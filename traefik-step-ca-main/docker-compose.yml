  #     DOCKER_STEPCA_INIT_ACME: true
  #     DOCKER_STEPCA_INIT_REMOTE_MANAGEMENT: true
  #   # placing in same network namespace as Traefik for TLS-ALPN-01 challenges to be able to
  #   # success against *.localtest.me (i.e. localhost).
  #   network_mode: "service:proxy"
  #   healthcheck:
  #     test: ["CMD", "step", "ca", "health"]
  #     start_interval: 5s
